<div class="form-container">
  <h2>Update Employee</h2>

  <input [(ngModel)]="employee.first_name" placeholder="First Name">
  <input [(ngModel)]="employee.last_name" placeholder="Last Name">
  <input [(ngModel)]="employee.email" placeholder="Email">
  <input [(ngModel)]="employee.designation" placeholder="Designation">
  <input [(ngModel)]="employee.department" placeholder="Department">

  <button (click)="update()">Update</button>
</div>
